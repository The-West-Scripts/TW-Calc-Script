name: CI

on:
    push:
        branches:
            - '*'
        tags:
            - v*
    pull_request:
    merge_group:
jobs:
    commitlint:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                  fetch-depth: 0
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
            - run: npm ci
            - uses: wagoid/commitlint-github-action@v6
              env:
                  NODE_PATH: ${{ github.workspace }}/node_modules

    lint:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
            - run: npm ci
            - run: npm run lint
            - run: npm run tsc

    test:
        runs-on: ubuntu-latest

        needs: lint

        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
            - run: npm ci
            - run: npm run test

    build:
        runs-on: ubuntu-latest

        needs: test

        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
            - run: npm ci
            - run: npm run build
              env:
                  CI: true
            - uses: actions/upload-artifact@v7
              with:
                  name: dist
                  path: dist

    release:
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        needs: build
        permissions:
            contents: write
        steps:
            - uses: actions/download-artifact@v8
              with:
                  name: dist
                  path: dist
            - name: Create draft release
              uses: softprops/action-gh-release@v3
              with:
                  draft: true
                  name: Release ${{ github.ref_name }}
                  files: dist/*.user.js
